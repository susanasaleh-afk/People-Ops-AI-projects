<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People Ops — AI Projects</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8F7F4;color:#1a1a1a;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:2rem 1rem}
button{font-family:inherit;cursor:pointer;border-radius:8px;transition:all .15s}
input,select,textarea{font-family:inherit;font-size:13px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;padding:7px 10px;background:#fff;width:100%;outline:none;color:#1a1a1a}
input:focus,select:focus,textarea:focus{border-color:#7F77DD;box-shadow:0 0 0 3px rgba(127,119,221,0.12)}
.btn-primary{font-size:13px;display:inline-flex;align-items:center;gap:6px;padding:7px 16px;background:#7F77DD;color:#fff;border:none;white-space:nowrap}
.btn-primary:hover{background:#534AB7}
.btn-outline{font-size:13px;padding:6px 14px;background:transparent;border:0.5px solid rgba(0,0,0,0.2);color:#444;display:inline-flex;align-items:center;gap:6px}
.btn-outline:hover{background:#f0eff0}
.btn-danger{font-size:13px;padding:6px 14px;background:transparent;border:0.5px solid #E24B4A;color:#A32D2D;border-radius:8px;display:inline-flex;align-items:center;gap:5px}
.btn-danger:hover{background:#FCEBEB}

/* Login screen */
.login-screen{display:none;min-height:100vh;align-items:center;justify-content:center;padding:1rem}
.login-screen.show{display:flex}
.login-box{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:16px;padding:2rem;width:100%;max-width:380px;text-align:center}
.login-logo{width:48px;height:48px;border-radius:12px;background:#EEEDFE;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:22px}
.login-box h2{font-size:18px;font-weight:500;margin-bottom:6px;color:#1a1a1a}
.login-box p{font-size:13px;color:#666;margin-bottom:1.5rem;line-height:1.5}
.login-error{font-size:12px;color:#A32D2D;margin-top:6px;display:none}
.login-error.show{display:block}

/* App */
.app{display:none}
.app.show{display:block}
.hdr{padding:1.5rem 0 1.25rem;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hdr-left h1{font-size:20px;font-weight:500;color:#1a1a1a}
.hdr-left p{font-size:13px;color:#666;margin-top:2px}
.hdr-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.user-chip{font-size:12px;padding:5px 10px;border-radius:99px;background:#EEEDFE;color:#3C3489;display:flex;align-items:center;gap:5px;border:0.5px solid #AFA9EC}

.nav-tabs{display:flex;gap:0;border-bottom:0.5px solid rgba(0,0,0,0.1);margin-bottom:1.25rem}
.nav-tab{font-size:13px;padding:10px 18px;background:none;border:none;border-bottom:2px solid transparent;color:#888;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;margin-bottom:-0.5px;white-space:nowrap}
.nav-tab.on{color:#7F77DD;border-bottom-color:#7F77DD;font-weight:500}
.nav-tab:hover{color:#534AB7}
.nav-count{font-size:11px;background:#EEECEA;color:#888;padding:1px 7px;border-radius:99px;font-weight:400}
.nav-tab.on .nav-count{background:#EEEDFE;color:#3C3489}
.view{display:none}.view.on{display:block}
.proj-card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.proj-card:hover{border-color:rgba(127,119,221,0.4)}
.proj-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.proj-card-title{font-size:14px;font-weight:500;color:#1a1a1a}
.proj-card-meta{display:flex;gap:8px;font-size:12px;color:#999;align-items:center;flex-wrap:wrap;margin-top:6px}
.tool-row{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:10px;padding:.75rem 1.25rem;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.tool-bar-wrap{flex:1;height:6px;background:#EEECEA;border-radius:99px;overflow:hidden}
.tool-bar{height:100%;background:#7F77DD;border-radius:99px;transition:width .4s}
.time-row{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:10px;padding:.75rem 1.25rem;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.time-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:150px}
.sw i{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:15px;color:#999;pointer-events:none}
.sw input{padding-left:32px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.pill{font-size:12px;padding:4px 12px;border-radius:99px;border:0.5px solid rgba(0,0,0,0.18);background:#fff;color:#555;cursor:pointer;font-family:inherit}
.pill.on{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC;font-weight:500}

.person-card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;margin-bottom:12px;overflow:hidden}
.person-head{display:flex;align-items:center;gap:14px;padding:1rem 1.25rem;cursor:pointer}
.person-head:hover{background:#fafafa}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;flex-shrink:0}
.person-info{flex:1}
.person-name{font-size:14px;font-weight:500;color:#1a1a1a}
.person-role{font-size:12px;color:#666;margin-top:1px}
.person-meta{display:flex;gap:10px;align-items:center;font-size:12px;color:#999;flex-shrink:0}
.chevron{font-size:16px;color:#aaa;transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.proj-list{border-top:0.5px solid rgba(0,0,0,0.08);padding:.75rem 1.25rem;display:flex;flex-direction:column;gap:8px}
.proj-row{background:#F8F7F4;border-radius:8px;padding:.75rem 1rem;cursor:pointer;transition:background .15s}
.proj-row:hover{background:#F0EEF8}
.proj-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.proj-title{font-size:13px;font-weight:500;color:#1a1a1a;flex:1}
.badge{font-size:11px;padding:3px 8px;border-radius:99px;white-space:nowrap}
.b-TA{background:#E6F1FB;color:#0C447C}
.b-WPS{background:#EEEDFE;color:#3C3489}
.b-L-D{background:#EAF3DE;color:#27500A}
.b-Wellbeing{background:#FAEEDA;color:#633806}
.b-Admin{background:#F1EFE8;color:#444441}
.tool-badge{font-size:11px;padding:2px 7px;border-radius:99px;border:0.5px solid rgba(0,0,0,0.15);color:#555;background:#fff}
.tag-chip{font-size:11px;padding:2px 8px;border-radius:99px;background:#F0EEF8;color:#534AB7;border:0.5px solid #AFA9EC}
.proj-meta{display:flex;gap:8px;font-size:12px;color:#999;align-items:center;flex-wrap:wrap}
.proj-add{display:flex;align-items:center;justify-content:center;gap:6px;padding:.6rem;border:0.5px dashed rgba(0,0,0,0.2);border-radius:8px;font-size:12px;color:#999;cursor:pointer;background:none;width:100%;font-family:inherit}
.proj-add:hover{background:#fff;color:#555}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);align-items:flex-start;justify-content:center;z-index:100;padding:1.5rem 1rem;overflow-y:auto}
.overlay.open{display:flex}
.panel{background:#fff;border-radius:12px;padding:1.5rem;width:100%;max-width:520px;margin:auto}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.panel-title{font-size:15px;font-weight:500;color:#1a1a1a}
.btn-x{background:none;border:none;cursor:pointer;color:#999;font-size:20px;line-height:1;padding:2px}
.field{margin-bottom:.9rem}
.field label{display:block;font-size:12px;color:#666;margin-bottom:3px}
.field textarea{height:68px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.pfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;align-items:center;flex-wrap:wrap}
.tabs{display:flex;gap:0;margin-bottom:1.25rem;border-bottom:0.5px solid rgba(0,0,0,0.1)}
.tab{font-size:13px;padding:8px 16px;background:none;border:none;border-bottom:2px solid transparent;color:#888;cursor:pointer;margin-bottom:-0.5px;font-family:inherit}
.tab.on{color:#7F77DD;border-bottom-color:#7F77DD;font-weight:500}
.tab-panel{display:none}.tab-panel.on{display:block}
.dl{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;margin-top:1rem}
.dv{font-size:13px;color:#1a1a1a;line-height:1.6}
.prompt-box{background:#F8F7F4;border-radius:8px;padding:.75rem;font-size:12px;font-family:'Courier New',monospace;color:#555;line-height:1.6;white-space:pre-wrap;margin-top:4px}
.note-box{background:#FFFBF0;border:0.5px solid #FAC775;border-radius:8px;padding:.75rem;font-size:13px;color:#633806;line-height:1.6;margin-top:4px}
.private-note-box{background:#F0EEF8;border:0.5px solid #AFA9EC;border-radius:8px;padding:.75rem;font-size:13px;color:#3C3489;line-height:1.6;margin-top:4px}
.tags-input-wrap{display:flex;flex-wrap:wrap;gap:6px;align-items:center;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;padding:6px 8px;background:#fff;min-height:38px;cursor:text}
.tags-input-wrap:focus-within{border-color:#7F77DD;box-shadow:0 0 0 3px rgba(127,119,221,0.12)}
.tag-pill{font-size:11px;padding:2px 8px;border-radius:99px;background:#EEEDFE;color:#3C3489;display:flex;align-items:center;gap:4px}
.tag-pill button{background:none;border:none;cursor:pointer;color:#7F77DD;font-size:13px;line-height:1;padding:0}
.tags-input-wrap input{border:none;outline:none;font-size:13px;padding:0;flex:1;min-width:80px;box-shadow:none;background:transparent}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:13px;padding:8px 18px;border-radius:99px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
@media(max-width:500px){.stats{grid-template-columns:repeat(2,1fr)}.row2,.row3{grid-template-columns:1fr}.person-meta{display:none}}
</style>
</head>
<body>

<!-- Login screen -->
<div class="login-screen show" id="login-screen">
  <div class="login-box">
    <div class="login-logo"><i class="ti ti-sparkles" style="color:#7F77DD"></i></div>
    <h2>People Ops — AI Projects</h2>
    <p>Enter your company email to access the team's AI project directory.</p>
    <div class="field" style="text-align:left">
      <label>Company email</label>
      <input type="email" id="login-email" placeholder="you@gig.com" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-error" id="login-error">Please use your @gig.com email address.</div>
    <button class="btn-primary" style="width:100%;justify-content:center;margin-top:.75rem;padding:10px" onclick="doLogin()">Enter</button>
  </div>
</div>

<!-- App -->
<div class="app" id="app">
<div class="container">

<div class="hdr">
  <div class="hdr-left">
    <h1>People Ops — AI projects</h1>
    <p>Who's building what with AI</p>
  </div>
  <div class="hdr-right">
    <div class="user-chip"><i class="ti ti-user-circle" style="font-size:14px"></i><span id="user-chip-label"></span></div>
    <button class="btn-primary" onclick="openNewPerson()"><i class="ti ti-user-plus"></i> Add person</button>
  </div>
</div>

<div class="nav-tabs" id="nav-tabs">
  <button class="nav-tab on" onclick="switchView('people')"><i class="ti ti-users"></i> People <span class="nav-count" id="count-people">—</span></button>
  <button class="nav-tab" onclick="switchView('projects')"><i class="ti ti-folder"></i> Projects <span class="nav-count" id="count-projects">—</span></button>
  <button class="nav-tab" onclick="switchView('tools')"><i class="ti ti-sparkles"></i> Tools <span class="nav-count" id="count-tools">—</span></button>
  <button class="nav-tab" onclick="switchView('time')"><i class="ti ti-clock"></i> Time saved <span class="nav-count" id="count-time">—</span></button>
</div>

<div class="view on" id="view-people">
  <div class="toolbar">
    <div class="sw"><i class="ti ti-search"></i><input type="text" id="q" placeholder="Search people or projects..." oninput="render()"></div>
    <select id="tool-filter" onchange="render()" style="width:auto;min-width:150px">
      <option value="">All tools</option>
      <option>Claude</option><option>ChatGPT</option><option>Gemini</option><option>Copilot</option><option>Other</option>
    </select>
  </div>
  <div class="pills" id="pills"></div>
  <div id="main"><div style="text-align:center;padding:3rem;color:#aaa;font-size:14px"><i class="ti ti-loader" style="font-size:24px;display:block;margin-bottom:8px"></i>Loading...</div></div>
</div>

<div class="view" id="view-projects">
  <div class="toolbar">
    <div class="sw"><i class="ti ti-search"></i><input type="text" id="q2" placeholder="Search projects..." oninput="renderProjects()"></div>
  </div>
  <div id="projects-list"><div style="text-align:center;padding:3rem;color:#aaa;font-size:14px">Loading...</div></div>
</div>

<div class="view" id="view-tools">
  <div id="tools-list"></div>
</div>

<div class="view" id="view-time">
  <div id="time-list"></div>
</div>

</div>
</div>

<!-- Person modal -->
<div class="overlay" id="person-overlay">
  <div class="panel">
    <div class="panel-head">
      <div class="panel-title" id="person-modal-title">New person</div>
      <button class="btn-x" onclick="closePersonModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="row2">
      <div class="field"><label>Full name</label><input type="text" id="pm-name" placeholder="e.g. Laura García"></div>
      <div class="field"><label>Work email</label><input type="email" id="pm-email" placeholder="e.g. laura@gig.com"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Role / title</label><input type="text" id="pm-role" placeholder="e.g. TA Specialist"></div>
      <div class="field"><label>Team</label><input type="text" id="pm-team" placeholder="e.g. People Ops, TA, WPS..."></div>
    </div>
    <div class="pfoot">
      <button id="person-del-btn" class="btn-danger" style="display:none;margin-right:auto" onclick="deletePerson()"><i class="ti ti-trash"></i> Delete</button>
      <button class="btn-outline" onclick="closePersonModal()">Cancel</button>
      <button class="btn-primary" onclick="savePerson()">Save</button>
    </div>
  </div>
</div>

<!-- Project modal -->
<div class="overlay" id="proj-overlay">
  <div class="panel">
    <div class="panel-head">
      <div class="panel-title" id="proj-modal-title">New project</div>
      <button class="btn-x" onclick="closeProjModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="field"><label>Project title</label><input type="text" id="pj-title" placeholder="e.g. Job description generator"></div>
    <div class="field"><label>Description</label><textarea id="pj-desc" placeholder="What does it do and what is it for?"></textarea></div>
    <div class="field"><label>Main prompt (optional)</label><textarea id="pj-prompt" placeholder="Paste the prompt or describe the workflow..." style="height:80px"></textarea></div>
    <div class="field"><label>Benefits</label><textarea id="pj-benefits" placeholder="e.g. Saves time on screening, reduces bias in JDs..." style="height:56px"></textarea></div>
    <div class="row2">
      <div class="field"><label>AI tool</label>
        <select id="pj-tool">
          <option>Claude</option><option>ChatGPT</option><option>Gemini</option><option>Copilot</option><option>Other</option>
        </select>
      </div>
      <div class="field"><label>Time saved / month</label><input type="text" id="pj-time" placeholder="e.g. 4h, 30 min..."></div>
    </div>
    <div class="field"><label>Team notes (visible to all)</label><textarea id="pj-public-notes" placeholder="Any tips, context or updates for the team..." style="height:56px"></textarea></div>
    <div class="field">
      <label>Tags (press Enter to add)</label>
      <div class="tags-input-wrap" id="tags-wrap" onclick="document.getElementById('tag-input').focus()">
        <input type="text" id="tag-input" placeholder="e.g. @susana, recruiting, onboarding..." onkeydown="handleTagInput(event)">
      </div>
    </div>
    <div class="pfoot">
      <button id="proj-del-btn" class="btn-danger" style="display:none;margin-right:auto" onclick="deleteProj()"><i class="ti ti-trash"></i> Delete</button>
      <button class="btn-outline" onclick="closeProjModal()">Cancel</button>
      <button class="btn-primary" onclick="saveProj()">Save</button>
    </div>
  </div>
</div>

<!-- Detail modal -->
<div class="overlay" id="detail-overlay">
  <div class="panel" style="max-width:540px" id="detail-panel"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://faglkmzuvpfdidzvlcgm.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhZ2xrbXp1dnBmZGlkenZsY2dtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NjI5NjUsImV4cCI6MjA5NTMzODk2NX0.y1Ii3e44W0LHytGY1r_9OwRIpJTcwDpQ6WWc16ff7cM';
const ALLOWED_DOMAIN='gig.com';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const AREAS=['all'];
const AREA_LABELS={all:'All'};
const AVATAR_COLORS=[
  {bg:'#EEEDFE',fg:'#3C3489'},{bg:'#E1F5EE',fg:'#085041'},
  {bg:'#E6F1FB',fg:'#0C447C'},{bg:'#FAEEDA',fg:'#633806'},
  {bg:'#FBEAF0',fg:'#72243E'},{bg:'#EAF3DE',fg:'#27500A'}
];

let currentArea='all',editingProjPersonId=null,editingProjId=null;
let allPeople=[],allProjects=[],allPrivateNotes=[],openPersonIds=new Set();
let currentTags=[];
let myEmail=localStorage.getItem('people-ops-email')||'';
let myName='';

function initials(n){return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function avatarStyle(ci){const c=AVATAR_COLORS[(ci||0)%AVATAR_COLORS.length];return `background:${c.bg};color:${c.fg}`;}
function toolIcon(t){const m={Claude:'ti-sparkles',ChatGPT:'ti-brand-openai',Gemini:'ti-brand-google',Copilot:'ti-brand-windows'};return m[t]||'ti-cpu';}
function projectsTime(projs){const t=projs.reduce((s,p)=>{const m=parseFloat((p.time_saved||'0').replace(',','.'));return s+(isNaN(m)?0:m);},0);return t>0?`~${Math.round(t)}h`:'—';}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
function emailToName(e){return e.split('@')[0].split('.').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');}

function doLogin(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  const err=document.getElementById('login-error');
  if(!email.endsWith('@'+ALLOWED_DOMAIN)){err.classList.add('show');return;}
  err.classList.remove('show');
  myEmail=email;
  myName=emailToName(email);
  localStorage.setItem('people-ops-email',email);
  showApp();
}

function showApp(){
  myName=emailToName(myEmail);
  document.getElementById('login-screen').classList.remove('show');
  document.getElementById('app').classList.add('show');
  document.getElementById('user-chip-label').textContent=myEmail;
  loadData().then(()=>{
    if(allPeople[0])openPersonIds.add(allPeople[0].id);
    render();
    updateCounts();
  });
}

async function loadData(){
  const [pRes,prRes,nRes]=await Promise.all([
    sb.from('people').select('*').order('created_at'),
    sb.from('projects').select('*').order('created_at'),
    sb.from('private_notes').select('*').eq('author_email',myEmail)
  ]);
  allPeople=pRes.data||[];
  allProjects=prRes.data||[];
  allPrivateNotes=nRes.data||[];
}

function render(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const tf=document.getElementById('tool-filter').value;
  let people=allPeople.filter(p=>{
    if(currentArea!=='all'&&p.team!==currentArea)return false;
    const projs=allProjects.filter(pr=>pr.person_id===p.id);
    if(q){
      const nm=p.name.toLowerCase().includes(q)||(p.role||'').toLowerCase().includes(q)||(p.team||'').toLowerCase().includes(q);
      const pm=projs.some(pr=>pr.title.toLowerCase().includes(q)||(pr.description||'').toLowerCase().includes(q)||((pr.tags||[]).some(t=>t.toLowerCase().includes(q))));
      if(!nm&&!pm)return false;
    }
    if(tf&&!projs.some(pr=>pr.tool===tf))return false;
    return true;
  });

  updateCounts();

  const teams=['all',...new Set(allPeople.map(p=>p.team).filter(Boolean))];
  const pillsEl=document.getElementById('pills');
  if(pillsEl)pillsEl.innerHTML=teams.map(a=>`<button class="pill ${currentArea===a?'on':''}" onclick="setArea('${a}')">${a==='all'?'All':a}</button>`).join('');

  const mainEl=document.getElementById('main');
  if(!mainEl)return;

  if(people.length===0){
    mainEl.innerHTML=`<div style="text-align:center;padding:3rem;color:#aaa;font-size:14px"><i class="ti ti-search" style="font-size:28px;display:block;margin-bottom:8px"></i>No results found</div>`;
    return;
  }

  mainEl.innerHTML=people.map(p=>{
    const projs=allProjects.filter(pr=>pr.person_id===p.id);
    const isOpen=openPersonIds.has(p.id);
    return `
    <div class="person-card">
      <div class="person-head" onclick="togglePerson('${p.id}')">
        <div class="avatar" style="${avatarStyle(p.color)}">${initials(p.name)}</div>
        <div class="person-info">
          <div class="person-name">${p.name}</div>
          <div class="person-role">${[p.role,p.team].filter(Boolean).join(' · ')}</div>
          ${p.email?`<div style="font-size:11px;color:#aaa;margin-top:1px">${p.email}</div>`:''}
        </div>
        <div class="person-meta">
          <span><i class="ti ti-folder" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>${projs.length}</span>
          <span><i class="ti ti-clock" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>${projectsTime(projs)}</span>
        </div>
        <button class="btn-x" style="padding:4px 8px;font-size:13px;color:#bbb" onclick="editPerson('${p.id}');event.stopPropagation()" title="Edit person"><i class="ti ti-edit"></i></button>
        <i class="ti ti-chevron-down chevron ${isOpen?'open':''}"></i>
      </div>
      ${isOpen?`<div class="proj-list">
        ${projs.map(pr=>`
          <div class="proj-row" onclick="openDetail('${p.id}','${pr.id}')">
            <div class="proj-top">
              <div class="proj-title">${pr.title}</div>
              ${p.team?`<span class="badge b-WPS" style="background:#EEEDFE;color:#3C3489">${p.team}</span>`:''}
            </div>
            <div style="font-size:12px;color:#666;margin-bottom:6px;line-height:1.5">${pr.description||''}</div>
            <div class="proj-meta">
              <span class="tool-badge"><i class="ti ${toolIcon(pr.tool)}" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>${pr.tool||''}</span>
              ${pr.time_saved?`<span><i class="ti ti-clock" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>${pr.time_saved}/month</span>`:''}
              ${(pr.tags||[]).map(t=>`<span class="tag-chip">${t}</span>`).join('')}
            </div>
          </div>
        `).join('')}
        <button class="proj-add" onclick="openNewProj('${p.id}');event.stopPropagation()"><i class="ti ti-plus"></i> Add project</button>
      </div>`:''}
    </div>`;
  }).join('');
}

function setArea(a){currentArea=a;render();}
function togglePerson(id){if(openPersonIds.has(id))openPersonIds.delete(id);else openPersonIds.add(id);render();}

let editingPersonId=null;
function openNewPerson(){
  editingPersonId=null;
  document.getElementById('person-modal-title').textContent='New person';
  ['pm-name','pm-email','pm-role','pm-team'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('person-del-btn').style.display='none';
  document.getElementById('person-overlay').classList.add('open');
}
function editPerson(id){
  const p=allPeople.find(x=>x.id===id);if(!p)return;
  editingPersonId=id;
  document.getElementById('person-modal-title').textContent='Edit person';
  document.getElementById('pm-name').value=p.name||'';
  document.getElementById('pm-email').value=p.email||'';
  document.getElementById('pm-role').value=p.role||'';
  document.getElementById('pm-team').value=p.team||'';
  document.getElementById('person-del-btn').style.display='inline-flex';
  document.getElementById('person-overlay').classList.add('open');
}
function closePersonModal(){document.getElementById('person-overlay').classList.remove('open');}
async function savePerson(){
  const name=document.getElementById('pm-name').value.trim();
  if(!name){document.getElementById('pm-name').focus();return;}
  const data={name,email:document.getElementById('pm-email').value.trim(),role:document.getElementById('pm-role').value.trim(),team:document.getElementById('pm-team').value.trim()};
  let error;
  if(editingPersonId){({error}=await sb.from('people').update(data).eq('id',editingPersonId));}
  else{({error}=await sb.from('people').insert({...data,color:allPeople.length%6}));}
  if(error){toast('Error saving');return;}
  toast(editingPersonId?'Person updated':'Person added');closePersonModal();await loadData();render();
}
async function deletePerson(){
  if(!confirm('Delete this person and all their projects?'))return;
  const {error}=await sb.from('people').delete().eq('id',editingPersonId);
  if(error){toast('Error');return;}
  toast('Person deleted');closePersonModal();await loadData();render();
}

function renderTagsInModal(){
  const wrap=document.getElementById('tags-wrap');
  const input=document.getElementById('tag-input');
  wrap.querySelectorAll('.tag-pill').forEach(e=>e.remove());
  currentTags.forEach((t,i)=>{
    const pill=document.createElement('span');
    pill.className='tag-pill';
    pill.innerHTML=`${t}<button onclick="removeTag(${i})" type="button">×</button>`;
    wrap.insertBefore(pill,input);
  });
}
function handleTagInput(e){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const val=e.target.value.trim().replace(/,$/,'');
    if(val&&!currentTags.includes(val)){currentTags.push(val);renderTagsInModal();}
    e.target.value='';
  }
  if(e.key==='Backspace'&&!e.target.value&&currentTags.length){currentTags.pop();renderTagsInModal();}
}
function removeTag(i){currentTags.splice(i,1);renderTagsInModal();}

function openNewProj(personId){
  editingProjPersonId=personId;editingProjId=null;currentTags=[];
  document.getElementById('proj-modal-title').textContent='New project';
  ['pj-title','pj-desc','pj-prompt','pj-benefits','pj-public-notes','pj-time','tag-input'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pj-tool').value='Claude';
  document.getElementById('proj-del-btn').style.display='none';
  renderTagsInModal();
  document.getElementById('proj-overlay').classList.add('open');
}
function closeProjModal(){document.getElementById('proj-overlay').classList.remove('open');}

async function saveProj(){
  const title=document.getElementById('pj-title').value.trim();
  if(!title){document.getElementById('pj-title').focus();return;}
  const data={person_id:editingProjPersonId,title,description:document.getElementById('pj-desc').value.trim(),prompt:document.getElementById('pj-prompt').value.trim(),benefits:document.getElementById('pj-benefits').value.trim(),public_notes:document.getElementById('pj-public-notes').value.trim(),tool:document.getElementById('pj-tool').value,time_saved:document.getElementById('pj-time').value.trim(),tags:currentTags};
  let error;
  if(editingProjId){({error}=await sb.from('projects').update(data).eq('id',editingProjId));}
  else{({error}=await sb.from('projects').insert(data));}
  if(error){toast('Error saving');return;}
  toast(editingProjId?'Project updated':'Project added');
  closeProjModal();await loadData();render();
}

async function deleteProj(){
  if(!confirm('Delete this project?'))return;
  const {error}=await sb.from('projects').delete().eq('id',editingProjId);
  if(error){toast('Error');return;}
  toast('Deleted');closeProjModal();await loadData();render();
}

function openDetail(personId,projId){
  const person=allPeople.find(x=>x.id===personId);
  const proj=allProjects.find(x=>x.id===projId);
  if(!proj||!person)return;
  const myNote=allPrivateNotes.find(n=>n.project_id===projId);
  document.getElementById('detail-panel').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem">
      <div>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap">
          ${person.team?`<span class="badge b-WPS" style="background:#EEEDFE;color:#3C3489">${person.team}</span>`:''}
          <span class="tool-badge"><i class="ti ${toolIcon(proj.tool)}" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>${proj.tool||''}</span>
          ${(proj.tags||[]).map(t=>`<span class="tag-chip">${t}</span>`).join('')}
        </div>
        <div style="font-size:15px;font-weight:500;color:#1a1a1a">${proj.title}</div>
        <div style="font-size:12px;color:#888;margin-top:3px">by ${person.name}</div>
      </div>
      <button class="btn-x" onclick="closeDetail()"><i class="ti ti-x"></i></button>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="switchTab(this,'tab-info')">Info</button>
      <button class="tab" onclick="switchTab(this,'tab-notes')">Team notes</button>
      <button class="tab" onclick="switchTab(this,'tab-private')">My notes <i class="ti ti-lock" style="font-size:11px"></i></button>
    </div>
    <div class="tab-panel on" id="tab-info">
      ${proj.description?`<div class="dl">Description</div><div class="dv">${proj.description}</div>`:''}
      ${proj.benefits?`<div class="dl">Benefits</div><div class="dv">${proj.benefits}</div>`:''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem">
        <div><div class="dl">AI tool</div><div class="dv">${proj.tool||'—'}</div></div>
        <div><div class="dl">Time saved / month</div><div class="dv">${proj.time_saved||'—'}</div></div>
      </div>
      ${proj.prompt?`<div class="dl">Prompt</div><div class="prompt-box">${proj.prompt}</div>`:''}
    </div>
    <div class="tab-panel" id="tab-notes">
      ${proj.public_notes?`<div class="note-box">${proj.public_notes}</div>`:'<div style="font-size:13px;color:#aaa;padding:.5rem 0">No team notes yet.</div>'}
      <div class="dl" style="margin-top:1rem">Edit team note</div>
      <textarea id="public-note-edit" style="height:80px;margin-top:4px" placeholder="Visible to everyone...">${proj.public_notes||''}</textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:8px"><button class="btn-primary" onclick="savePublicNote('${projId}')">Save</button></div>
    </div>
    <div class="tab-panel" id="tab-private">
      <div style="font-size:12px;color:#888;margin-bottom:.75rem"><i class="ti ti-lock" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>Only visible to you (${myEmail})</div>
      ${myNote?`<div class="private-note-box">${myNote.note}</div>`:'<div style="font-size:13px;color:#aaa;padding:.25rem 0">No private notes yet.</div>'}
      <div class="dl" style="margin-top:1rem">My private note</div>
      <textarea id="private-note-edit" style="height:80px;margin-top:4px" placeholder="Only you can see this...">${myNote?myNote.note:''}</textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:8px"><button class="btn-primary" onclick="savePrivateNote('${projId}','${myNote?myNote.id:''}')">Save</button></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid rgba(0,0,0,0.08)">
      <button class="btn-outline" onclick="startEditProj('${personId}','${projId}')"><i class="ti ti-edit"></i> Edit</button>
      <button class="btn-primary" onclick="closeDetail()">Close</button>
    </div>
  `;
  document.getElementById('detail-overlay').classList.add('open');
}

function switchTab(btn,tabId){
  document.querySelectorAll('#detail-panel .tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('#detail-panel .tab-panel').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');document.getElementById(tabId).classList.add('on');
}

async function savePublicNote(projId){
  const note=document.getElementById('public-note-edit').value.trim();
  const {error}=await sb.from('projects').update({public_notes:note}).eq('id',projId);
  if(error){toast('Error saving');return;}
  toast('Team note saved');await loadData();
}

async function savePrivateNote(projId,existingId){
  const note=document.getElementById('private-note-edit').value.trim();
  let error;
  if(existingId){({error}=await sb.from('private_notes').update({note,updated_at:new Date().toISOString()}).eq('id',existingId));}
  else{({error}=await sb.from('private_notes').insert({project_id:projId,author_email:myEmail,author_name:myName,note}));}
  if(error){toast('Error saving');return;}
  toast('Private note saved');await loadData();
}

function closeDetail(){document.getElementById('detail-overlay').classList.remove('open');}

function startEditProj(personId,projId){
  closeDetail();
  const proj=allProjects.find(x=>x.id===projId);
  if(!proj)return;
  editingProjPersonId=personId;editingProjId=projId;
  currentTags=[...(proj.tags||[])];
  document.getElementById('proj-modal-title').textContent='Edit project';
  document.getElementById('pj-title').value=proj.title||'';
  document.getElementById('pj-desc').value=proj.description||'';
  document.getElementById('pj-prompt').value=proj.prompt||'';
  document.getElementById('pj-benefits').value=proj.benefits||'';
  document.getElementById('pj-public-notes').value=proj.public_notes||'';
  document.getElementById('pj-tool').value=proj.tool||'Claude';
  document.getElementById('pj-time').value=proj.time_saved||'';
  document.getElementById('tag-input').value='';
  document.getElementById('proj-del-btn').style.display='inline-flex';
  renderTagsInModal();
  document.getElementById('proj-overlay').classList.add('open');
}

let currentView='people';

function switchView(v){
  currentView=v;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.view').forEach(t=>t.classList.remove('on'));
  document.querySelector(`.nav-tab[onclick="switchView('${v}')"]`).classList.add('on');
  document.getElementById('view-'+v).classList.add('on');
  if(v==='projects')renderProjects();
  if(v==='tools')renderTools();
  if(v==='time')renderTime();
}

function updateCounts(){
  document.getElementById('count-people').textContent=allPeople.length;
  document.getElementById('count-projects').textContent=allProjects.length;
  const tools=[...new Set(allProjects.map(p=>p.tool).filter(Boolean))].length;
  document.getElementById('count-tools').textContent=tools||0;
  const totalTime=allProjects.reduce((s,p)=>{const m=parseFloat((p.time_saved||'0').replace(',','.'));return s+(isNaN(m)?0:m);},0);
  document.getElementById('count-time').textContent=totalTime>0?'~'+Math.round(totalTime)+'h':'—';
}

function renderProjects(){
  const q=(document.getElementById('q2').value||'').toLowerCase();
  let projs=allProjects.filter(pr=>{
    if(!q)return true;
    return pr.title.toLowerCase().includes(q)||(pr.description||'').toLowerCase().includes(q)||((pr.tags||[]).some(t=>t.toLowerCase().includes(q)));
  });
  const el=document.getElementById('projects-list');
  if(!projs.length){el.innerHTML='<div style="text-align:center;padding:3rem;color:#aaa;font-size:14px">No projects yet</div>';return;}
  el.innerHTML=projs.map(pr=>{
    const person=allPeople.find(p=>p.id===pr.person_id);
    return `<div class="proj-card" onclick="openDetail('${pr.person_id}','${pr.id}')">
      <div class="proj-card-top">
        <div class="proj-card-title">${pr.title}</div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          <span class="tool-badge"><i class="ti ${toolIcon(pr.tool)}" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>${pr.tool||''}</span>
          ${person?`<span style="font-size:11px;background:#EEEDFE;color:#3C3489;padding:2px 8px;border-radius:99px">${person.team||person.name}</span>`:''}
        </div>
      </div>
      <div style="font-size:12px;color:#666;line-height:1.5;margin-bottom:6px">${pr.description||''}</div>
      <div class="proj-card-meta">
        ${person?`<span><i class="ti ti-user" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>${person.name}</span>`:''}
        ${pr.time_saved?`<span><i class="ti ti-clock" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>${pr.time_saved}/month</span>`:''}
        ${(pr.tags||[]).map(t=>`<span class="tag-chip">${t}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderTools(){
  const toolCounts={};
  allProjects.forEach(p=>{if(p.tool){toolCounts[p.tool]=(toolCounts[p.tool]||0)+1;}});
  const sorted=Object.entries(toolCounts).sort((a,b)=>b[1]-a[1]);
  const max=sorted[0]?.[1]||1;
  const el=document.getElementById('tools-list');
  if(!sorted.length){el.innerHTML='<div style="text-align:center;padding:3rem;color:#aaa;font-size:14px">No projects yet</div>';return;}
  el.innerHTML=`<div style="margin-bottom:1rem;font-size:13px;color:#666">${allProjects.length} projects across ${sorted.length} tool${sorted.length!==1?'s':''}</div>`+
  sorted.map(([tool,count])=>`
    <div class="tool-row">
      <i class="ti ${toolIcon(tool)}" style="font-size:20px;color:#7F77DD;width:24px;text-align:center"></i>
      <div style="font-size:13px;font-weight:500;min-width:80px">${tool}</div>
      <div class="tool-bar-wrap"><div class="tool-bar" style="width:${Math.round(count/max*100)}%"></div></div>
      <div style="font-size:13px;font-weight:500;color:#7F77DD;min-width:30px;text-align:right">${count}</div>
      <div style="font-size:12px;color:#aaa">${count===1?'project':'projects'}</div>
    </div>
  `).join('');
}

function renderTime(){
  const el=document.getElementById('time-list');
  const rows=allPeople.map(p=>{
    const projs=allProjects.filter(pr=>pr.person_id===p.id);
    const t=projs.reduce((s,pr)=>{const m=parseFloat((pr.time_saved||'0').replace(',','.'));return s+(isNaN(m)?0:m);},0);
    return {person:p,projs:projs.length,time:t};
  }).filter(r=>r.projs>0).sort((a,b)=>b.time-a.time);
  const totalTime=rows.reduce((s,r)=>s+r.time,0);
  if(!rows.length){el.innerHTML='<div style="text-align:center;padding:3rem;color:#aaa;font-size:14px">No time data yet</div>';return;}
  const max=rows[0]?.time||1;
  el.innerHTML=`<div style="margin-bottom:1rem;font-size:13px;color:#666">~${Math.round(totalTime)}h saved per month across the team</div>`+
  rows.map(r=>`
    <div class="time-row">
      <div class="time-avatar" style="${avatarStyle(r.person.color)}">${initials(r.person.name)}</div>
      <div style="min-width:120px">
        <div style="font-size:13px;font-weight:500">${r.person.name}</div>
        <div style="font-size:11px;color:#aaa">${r.projs} project${r.projs!==1?'s':''}</div>
      </div>
      <div class="tool-bar-wrap"><div class="tool-bar" style="width:${r.time>0?Math.round(r.time/max*100):4}%"></div></div>
      <div style="font-size:13px;font-weight:500;color:#7F77DD;min-width:40px;text-align:right">${r.time>0?'~'+Math.round(r.time)+'h':'—'}</div>
    </div>
  `).join('');
}

sb.channel('people-ops-rt')
  .on('postgres_changes',{event:'*',schema:'public',table:'people'},async()=>{await loadData();render();updateCounts();})
  .on('postgres_changes',{event:'*',schema:'public',table:'projects'},async()=>{await loadData();render();updateCounts();})
  .subscribe();

if(myEmail&&myEmail.endsWith('@'+ALLOWED_DOMAIN)){showApp();}
</script>
